# === ClickHouse ===
clickhouse:
  host: clickhouse
  port: 9000
  database: default

# === Настройки ===
settings:
  backup_enabled: true
  backup_retention_days: 10
  batch_size: 50000

# === Схемы ===
# Каждая схема ссылается на source и указывает database на этом сервере
schemas:
  finboon:
    source: mariadb_main
    database: finboon
    company_id: "company_001"
    schedule: "0 2 * * *"

  variant:
    source: mariadb_main
    database: variant
    company_id: "company_002"
    schedule: "0 3 * * *"

  # Пример: схема на другом сервере
